<style>
:root{
  --g:#16a34a;--g2:#22c55e;--g3:#15803d;
  --gg:linear-gradient(135deg,#15803d,#22c55e);
  --bg:#0a0e0c;--bg1:#0f1512;--bg2:#141a16;--bg3:#1a221d;
  --tx:#eef4f0;--tx2:rgba(238,244,240,.62);--tx3:rgba(238,244,240,.35);
  --bdr:rgba(34,197,94,.12);--bdr2:rgba(34,197,94,.25);--bdr3:rgba(34,197,94,.5);
  --card:rgba(255,255,255,.025);--card2:rgba(255,255,255,.05);
  --red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --sh:0 8px 32px rgba(0,0,0,.5);--shg:0 4px 20px rgba(34,197,94,.18);
  --fd:'Oswald',sans-serif;--fb:'Inter',sans-serif;
  --nav:62px;--rad:14px;--rad2:18px;
}
.lt{
  --bg:#eef1ee;--bg1:#f7f9f7;--bg2:#fff;--bg3:#eef2ef;
  --tx:#10140f;--tx2:rgba(16,20,15,.62);--tx3:rgba(16,20,15,.38);
  --bdr:rgba(21,128,61,.14);--bdr2:rgba(21,128,61,.28);--bdr3:rgba(21,128,61,.5);
  --card:rgba(0,0,0,.025);--card2:rgba(0,0,0,.05);
  --sh:0 8px 32px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{min-height:100dvh;background:var(--bg);color:var(--tx);font-family:var(--fb);overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bdr3);border-radius:2px}

/* APP SHELL */
#app{min-height:100dvh;display:flex;flex-direction:column;position:relative}
.view{display:none;animation:fade .3s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:40;height:var(--nav);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:var(--bg1);border-bottom:1px solid var(--bdr)}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-logo{width:34px;height:34px;border-radius:9px;background:var(--gg);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:var(--shg)}
.tb-tit{font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:.5px;line-height:1}
.tb-tit span{color:var(--g2)}
.tb-sub{font-size:8.5px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase}
.tb-r{display:flex;align-items:center;gap:8px}
.ic-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--bdr);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.2s}
.ic-btn:active{transform:scale(.92)}

/* CONTENT */
.content{flex:1;padding:18px;padding-bottom:calc(var(--nav) + 20px);max-width:760px;margin:0 auto;width:100%}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:40;height:var(--nav);display:flex;background:var(--bg1);border-top:1px solid var(--bdr);max-width:760px;margin:0 auto}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;transition:.2s}
.ni .ic{font-size:19px;opacity:.5;transition:.2s}
.ni .lb{font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:.4px;text-transform:uppercase}
.ni.on .ic{opacity:1;transform:translateY(-2px)}
.ni.on .lb{color:var(--g2)}

/* HEADINGS */
.h-t{font-family:var(--fd);font-size:24px;font-weight:700;letter-spacing:.3px;margin-bottom:3px}
.h-s{font-size:11px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:18px}
.sec-l{display:flex;align-items:center;gap:9px;font-size:9.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin:22px 0 12px}
.sec-l::before{content:'';width:14px;height:1px;background:var(--g)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rad2);padding:18px;margin-bottom:12px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-h h3{font-family:var(--fd);font-size:17px;font-weight:600;letter-spacing:.3px}

/* INPUTS */
.iw{margin-bottom:13px}
.iw label{display:block;font-size:10px;font-weight:600;color:var(--g2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.inp{width:100%;padding:12px 14px;background:var(--card2);border:1px solid var(--bdr);border-radius:10px;color:var(--tx);font-family:var(--fb);font-size:14px;outline:none;transition:.2s}
.inp:focus{border-color:var(--g)}
.inp::placeholder{color:var(--tx3)}
select.inp option{background:var(--bg2);color:var(--tx)}
textarea.inp{resize:none;min-height:70px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:11px;font-family:var(--fd);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.2s;letter-spacing:.5px;text-transform:uppercase}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--gg);color:#fff;box-shadow:var(--shg)}
.btn-o{background:transparent;color:var(--g2);border:1px solid var(--bdr2)}
.btn-d{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.btn-w{width:100%}
.btn-sm{padding:9px 16px;font-size:11px}
.btn-xs{padding:6px 12px;font-size:10px;border-radius:8px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.b-c{background:rgba(34,197,94,.15);color:var(--g2)}
.b-nc{background:rgba(239,68,68,.15);color:#f87171}
.b-na{background:rgba(148,163,184,.15);color:#94a3b8}
.b-alto{background:rgba(239,68,68,.18);color:#f87171}
.b-medio{background:rgba(245,158,11,.18);color:#fbbf24}
.b-baixo{background:rgba(34,197,94,.15);color:var(--g2)}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--bg2);border:1px solid var(--bdr3);border-radius:11px;padding:11px 20px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shg);max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.s{color:var(--g2)}.toast.e{color:#f87171}.toast.i{color:var(--tx)}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.mov.open{display:flex}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;width:100%;max-width:600px;max-height:90dvh;overflow-y:auto;padding:22px;border-top:1px solid var(--bdr2)}
.mbar{width:36px;height:3px;background:var(--bdr3);border-radius:2px;margin:0 auto 20px}
.modal h3{font-family:var(--fd);font-size:20px;margin-bottom:16px}

/* STEPS */
.steps{display:flex;align-items:center;gap:5px;margin-bottom:22px}
.sdot{flex:1;height:3px;border-radius:2px;background:var(--bdr2);transition:.3s}
.sdot.on{background:var(--gg)}

/* KPI */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rad2);padding:16px;position:relative;overflow:hidden}
.kpi::after{content:attr(data-ic);position:absolute;right:-6px;bottom:-10px;font-size:54px;opacity:.06}
.kpi .kl{font-size:9.5px;font-weight:600;color:var(--g2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi .kv{font-family:var(--fd);font-size:30px;font-weight:700;line-height:1}
.kpi .ks{font-size:10px;color:var(--tx3);margin-top:3px}

/* INSPECTION ITEM */
.insp-item{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rad2);padding:16px;margin-bottom:12px;transition:.2s}
.insp-item.done-c{border-left:3px solid var(--g)}
.insp-item.done-nc{border-left:3px solid var(--red)}
.insp-item.done-na{border-left:3px solid #94a3b8}
.ii-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.ii-tit{font-size:13.5px;font-weight:600;line-height:1.35;flex:1}
.ii-norma{font-size:10px;color:var(--g2);font-weight:600;font-family:var(--fd);letter-spacing:.5px;margin-top:3px}
.ii-desc{font-size:11.5px;color:var(--tx2);line-height:1.5;margin-bottom:12px}
.ii-opts{display:flex;gap:6px;margin-bottom:10px}
.ii-opt{flex:1;padding:10px 5px;border:1px solid var(--bdr);border-radius:9px;background:var(--card2);font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:.2s;font-family:var(--fd);letter-spacing:.2px;text-transform:uppercase;line-height:1.2;display:flex;align-items:center;justify-content:center}
.ii-opt.sel-c{background:#16a34a !important;border-color:#16a34a !important;color:#fff !important;box-shadow:0 2px 10px rgba(22,163,74,.45);transform:translateY(-1px)}
.ii-opt.sel-nc{background:#dc2626 !important;border-color:#dc2626 !important;color:#fff !important;box-shadow:0 2px 10px rgba(220,38,38,.45);transform:translateY(-1px)}
.ii-opt.sel-na{background:#64748b !important;border-color:#64748b !important;color:#fff !important;box-shadow:0 2px 8px rgba(100,116,139,.35)}
@keyframes spin360{to{transform:rotate(360deg)}}
.ic-btn.spin{animation:spin360 .7s linear infinite}
.ii-extra{display:none}
.ii-extra.show{display:block;animation:fade .25s ease}
.ii-photos{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.ii-photo{width:60px;height:60px;border-radius:9px;object-fit:cover;border:1px solid var(--bdr2);position:relative}
.ii-photo-wrap{position:relative}
.ii-photo-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.photo-btns{display:flex;gap:7px;margin-bottom:10px}
.photo-btn{flex:1;padding:10px;border:1px dashed var(--bdr2);border-radius:9px;background:var(--card2);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;font-family:var(--fb)}
.photo-btn:active{border-color:var(--g)}

/* PROGRESS */
.prog{height:6px;background:var(--card2);border-radius:3px;overflow:hidden;margin:14px 0}
.prog-fill{height:100%;background:var(--gg);border-radius:3px;transition:.4s;width:0%}

/* SECTION GROUP */
.grp-h{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:10px;cursor:pointer}
.grp-h h4{font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.3px}
.grp-count{font-size:10px;color:var(--tx3)}

/* HISTORY ITEM */
.hist-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:9px;transition:.2s}
.hist-ic{width:42px;height:42px;border-radius:11px;background:var(--gg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hist-i{flex:1;min-width:0}
.hist-i h4{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-i p{font-size:11px;color:var(--tx3);margin-top:2px}

/* LIST ITEM SETTINGS */
.set-item{display:flex;align-items:center;justify-content:space-between;padding:14px 15px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:8px;cursor:pointer;transition:.2s}
.set-item:active{border-color:var(--bdr2)}
.set-l{display:flex;align-items:center;gap:11px}
.set-ic{width:36px;height:36px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px}
.set-tx h4{font-size:13px;font-weight:600}
.set-tx p{font-size:10.5px;color:var(--tx3);margin-top:1px}

/* TOGGLE */
.tgl{position:relative;width:42px;height:23px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;inset:0;background:var(--bdr2);border-radius:12px;cursor:pointer;transition:.3s}
.tgl-s::before{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.tgl input:checked+.tgl-s{background:var(--gg)}
.tgl input:checked+.tgl-s::before{transform:translateX(19px)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty .ei{font-size:44px;margin-bottom:12px;opacity:.4}
.empty p{font-size:13px}

/* LOGIN */
.login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo .ll{width:66px;height:66px;border-radius:17px;background:var(--gg);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;box-shadow:var(--shg)}
.login-logo h1{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:.5px}
.login-logo h1 span{color:var(--g2)}
.login-logo p{font-size:10px;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-top:4px}

/* HERO ACTION */
.hero-act{background:var(--gg);border-radius:var(--rad2);padding:22px;margin-bottom:18px;position:relative;overflow:hidden;cursor:pointer}
.hero-act::after{content:'🏗️';position:absolute;right:-8px;bottom:-12px;font-size:80px;opacity:.13}
.hero-act h2{font-family:var(--fd);font-size:21px;font-weight:700;color:#fff;letter-spacing:.3px;margin-bottom:5px;position:relative;z-index:1}
.hero-act p{font-size:12px;color:rgba(255,255,255,.85);position:relative;z-index:1}
.hero-act .ha-btn{display:inline-flex;align-items:center;gap:7px;margin-top:14px;padding:10px 18px;background:rgba(255,255,255,.2);border-radius:9px;font-family:var(--fd);font-size:12px;font-weight:600;color:#fff;letter-spacing:.5px;text-transform:uppercase;position:relative;z-index:1}

@media(min-width:720px){.kgrid{grid-template-columns:repeat(4,1fr)}}
</style>
<style id="pws-skin">
:root{
  --fd:'Sora',sans-serif; --fb:'Manrope',sans-serif;
  --g:#16a34a; --g2:#22c55e; --g3:#15803d; --gg:linear-gradient(135deg,#15803d,#22c55e);
  --bg:#0a0f1a; --bg1:#111827; --bg2:#0f1726; --bg3:#162133;
  --tx:#e8edf6; --tx2:rgba(232,237,246,.66); --tx3:rgba(232,237,246,.40);
  --bdr:rgba(255,255,255,.08); --bdr2:rgba(255,255,255,.15); --bdr3:rgba(34,197,94,.5);
  --card:#111827; --card2:#0f1726;
  --sh:0 18px 40px -24px rgba(0,0,0,.75); --shg:0 8px 22px -10px rgba(34,197,94,.55);
  --rad:14px; --rad2:18px;
}
.lt{
  --bg:#f4f6f8; --bg1:#ffffff; --bg2:#f8fafc; --bg3:#eef2f6;
  --tx:#111827; --tx2:rgba(17,24,39,.66); --tx3:rgba(17,24,39,.42);
  --bdr:#e6e9ee; --bdr2:#d7dde3; --bdr3:rgba(21,128,61,.5);
  --card:#ffffff; --card2:#f8fafc; --sh:0 14px 34px -24px rgba(16,24,40,.45);
}
body{ font-family:var(--fb); }
.tb-tit,.h-t,.card-h h3,.modal h3,.login-logo h1,.kpi .kv,.hero-act h2,.grp-h h4{ font-family:'Sora',sans-serif; letter-spacing:-.01em; }
.topbar{ background:color-mix(in srgb,var(--bg1) 86%,transparent); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); }
.ic-btn{ background:var(--bg2); border:1px solid var(--bdr); }
.card,.kpi,.insp-item,.hist-item,.set-item,.grp-h{ background:var(--bg1) !important; border:1px solid var(--bdr) !important; box-shadow:var(--sh); }
.inp{ background:var(--bg2) !important; border:1px solid var(--bdr) !important; }
.ii-opt:not([class*="sel-"]):not([style*="background"]),.photo-btn{ background:var(--bg2) !important; }
.modal{ background:var(--bg1) !important; }
/* MENU LATERAL DESLIZANTE */
.pws-ov{ position:fixed; inset:0; background:rgba(2,6,15,.55); -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); z-index:600; opacity:0; pointer-events:none; transition:.25s; }
.pws-ov.open{ opacity:1; pointer-events:auto; }
.pws-drawer{ position:fixed; top:0; left:0; bottom:0; width:272px; max-width:84vw; background:#0b1220; color:#fff; transform:translateX(-100%); transition:transform .26s cubic-bezier(.4,0,.2,1); z-index:610; display:flex; flex-direction:column; box-shadow:0 0 60px rgba(0,0,0,.6); }
.pws-drawer.open{ transform:none; }
.pws-dhead{ display:flex; align-items:center; gap:11px; padding:18px 15px; border-bottom:1px solid rgba(255,255,255,.08); }
.pws-dlogo{ width:42px; height:42px; border-radius:12px; background:var(--gg); display:flex; align-items:center; justify-content:center; font-size:21px; box-shadow:var(--shg); flex:0 0 auto; }
.pws-dtitle{ font-family:'Sora',sans-serif; font-weight:800; font-size:16px; }
.pws-dtitle span{ color:#34d399; }
.pws-dsub{ font-size:11px; color:#9aa6bd; margin-top:2px; }
.pws-dclose{ margin-left:auto; background:transparent; border:none; color:#9aa6bd; font-size:18px; cursor:pointer; width:32px; height:32px; border-radius:8px; }
.pws-dclose:hover{ background:rgba(255,255,255,.08); color:#fff; }
.pws-nav{ padding:12px; display:flex; flex-direction:column; gap:4px; overflow:auto; }
.pws-navlink{ display:flex; align-items:center; gap:13px; padding:12px 14px; border-radius:12px; color:#aab4c5; font-weight:600; font-size:14.5px; cursor:pointer; transition:.15s; font-family:var(--fb); }
.pws-navlink span{ font-size:18px; width:22px; text-align:center; }
.pws-navlink:hover{ background:rgba(255,255,255,.07); color:#fff; }
.pws-navlink.on{ background:var(--g); color:#fff; }
.pws-navlink.danger{ margin-top:8px; color:#fca5a5; }
.pws-navlink.danger:hover{ background:rgba(239,68,68,.18); color:#fecaca; }
.bnav{ display:none !important; }
.content{ padding-bottom:28px !important; }
.pws-sec{ font-size:10px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; color:#5d6b82; padding:14px 14px 6px; }
.mod-grid{ display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.mod-card{ display:flex; align-items:center; gap:14px; background:var(--bg1); border:1px solid var(--bdr); border-radius:16px; padding:15px; cursor:pointer; transition:.15s; box-shadow:var(--sh); }
.mod-card:hover{ border-color:var(--g); transform:translateY(-2px); }
.mod-ic{ width:46px; height:46px; border-radius:13px; background:var(--gg); display:flex; align-items:center; justify-content:center; font-size:23px; flex:0 0 auto; box-shadow:var(--shg); }
.mod-tx{ flex:1; min-width:0; }
.mod-tx h3{ font-family:'Sora',sans-serif; font-size:15px; font-weight:800; color:var(--tx); }
.mod-tx p{ font-size:11.5px; color:var(--tx3); margin-top:2px; line-height:1.35; }
.mod-go{ color:var(--g2); font-size:20px; font-weight:700; }
.nr-head{ font-size:11px; font-weight:700; color:var(--tx3); margin:12px 0 4px; }

// ═══════════════════════════════════════════════════
// EXIF — corrigir rotação de fotos
// ═══════════════════════════════════════════════════
// Leitura robusta de imagem: corrige rotação (retrato e paisagem) usando a
// orientação EXIF nativa do navegador, reduz tamanho para economizar memória
// e NUNCA trava — sempre resolve ou rejeita (com timeout de segurança).
function corrigirExif(file){
  return new Promise(function(resolve,reject){
    var settled=false, url=null;
    var to=setTimeout(function(){ end(null,true); }, 25000);
    function cleanup(){ clearTimeout(to); if(url){ try{URL.revokeObjectURL(url)}catch(e){} } }
    function end(val,isErr){
      if(settled)return; settled=true; cleanup();
      if(isErr||!val) reject(new Error('falha ao processar imagem'));
      else resolve(val);
    }
    if(!file || !/^image\//i.test(file.type||'')){ end(null,true); return; }
    var img=new Image();
    // mantém a orientação que o navegador já aplica (foto em pé ou deitada)
    try{ img.setAttribute('decoding','sync'); }catch(e){}
    img.onload=function(){
      try{
        var sw=img.naturalWidth||img.width, sh=img.naturalHeight||img.height;
        if(!sw||!sh){ end(null,true); return; }
        var maxD=1600, r=Math.min(1, maxD/Math.max(sw,sh));
        var dw=Math.max(1,Math.round(sw*r)), dh=Math.max(1,Math.round(sh*r));
        var cv=document.createElement('canvas'); cv.width=dw; cv.height=dh;
        var ctx=cv.getContext('2d');
        if(!ctx){ end(null,true); return; }
        try{ ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high'; }catch(e){}
        ctx.drawImage(img,0,0,dw,dh);
        var out=cv.toDataURL('image/jpeg',0.82);
        if(!out || out.length<60){ end(null,true); return; }
        end(out,false);
      }catch(err){ end(null,true); }
    };
    img.onerror=function(){ end(null,true); };
    try{
      if(window.URL && URL.createObjectURL){ url=URL.createObjectURL(file); img.src=url; }
      else {
        var fr=new FileReader();
        fr.onload=function(e){ img.src=e.target.result; };
        fr.onerror=function(){ end(null,true); };
        fr.readAsDataURL(file);
      }
    }catch(err){ end(null,true); }
  });
}

function toggleSenhaLogin(){var i=document.getElementById('lSenha');if(i)i.type=(i.type==='password'?'text':'password');}
function loginErr(m){var e=document.getElementById('lErr');if(e){e.textContent=m;e.style.display='block'}}
function loginBusy(b){var btn=document.getElementById('lBtn');if(btn){btn.disabled=b;btn.textContent=b?'Entrando...':'Entrar';}}
function entrarOffline(em){
  var cu=null;try{cu=JSON.parse(localStorage.getItem('cs18_user')||'null')}catch(e){}
  if(cu&&cu.email===em){USER=cu;ROLE=cu.role;VIEW='dash';render();toast('Modo offline — sincroniza ao reconectar','i');return true;}
  return false;
}
function doLogin(){
  var em=document.getElementById('lEmail').value.trim().toLowerCase();
  var sn=document.getElementById('lSenha').value.trim();
  if(document.getElementById('lErr'))document.getElementById('lErr').style.display='none';
  if(!em||!sn){loginErr('Preencha email e senha');return}
  if(!SB||!navigator.onLine){
    if(!entrarOffline(em))loginErr('Sem internet. Conecte-se uma vez neste aparelho para entrar.');
    return;
  }
  loginBusy(true);
  SB.auth.signInWithPassword({email:em,password:sn}).then(function(r){
    if(r.error){loginBusy(false);loginErr('Email ou senha incorretos');return;}
    carregarPerfil(r.data.user).then(function(){loginBusy(false);VIEW='dash';render();sincronizar(true);});
  }).catch(function(){
    loginBusy(false);
    if(!entrarOffline(em))loginErr('Falha de conexão. Tente novamente.');
  });
}
function doLogout(){
  if(SB){try{SB.auth.signOut();}catch(e){}}
  USER=null;ROLE=null;localStorage.removeItem('cs18_user');VIEW='dash';render();
}
function trocarSenha(){
  var n=document.getElementById('sa2').value;
  if(!n||n.length<6){toast('Mínimo 6 caracteres','e');return}
  if(!SB||!navigator.onLine){toast('Precisa de internet para trocar a senha','e');return}
  SB.auth.updateUser({password:n}).then(function(r){
    if(r.error){toast('Erro: '+r.error.message,'e');return;}
    closeM();toast('Senha alterada!','s');
  }).catch(function(){toast('Falha ao trocar senha','e')});
}

function atualizarApp(){

  try{load();}catch(e){}
  function fim(){var bb=document.getElementById('btnAtualizar');if(bb)bb.classList.remove('spin');toast('Atualizado!','s');}
  if(VIEW==='relatos'&&typeof carregarRelatos==='function'){carregarRelatos(function(){render();fim();});}

function bnav(){
  var items = ehUsuario()
    ? [{id:'dash',ic:'🏠',lb:'Início'},{id:'ronda',ic:'🛡️',lb:'RondaSafe'},{id:'config',ic:'⚙️',lb:'Config'}]
    : [{id:'dash',ic:'🏠',lb:'Início'},{id:'nova',ic:'➕',lb:'Nova'},{id:'hist',ic:'📋',lb:'Histórico'},{id:'config',ic:'⚙️',lb:'Config'}];
  return '<nav class="bnav">'+items.map(function(n){
    var on=(n.id==='ronda')?(VIEW&&VIEW.indexOf('ronda')===0):(VIEW===n.id);
    return '<button class="ni'+(on?' on':'')+'" onclick="navTo(\''+n.id+'\')"><span class="ic">'+n.ic+'</span><span class="lb">'+n.lb+'</span></button>';
  }).join('')+'</nav>';
}
function navTo(v){
  if(ehUsuario()&&!(v==='dash'||v==='config'||(v&&v.indexOf('ronda')===0))){VIEW='ronda';render();rondaCarregar(function(){if(VIEW&&VIEW.indexOf('ronda')===0)render();});return;}
  if(v==='nova'){iniciarInspecao();return}
  if(v&&v.indexOf('ronda')===0){VIEW=v;render();rondaCarregar(function(){if(VIEW&&VIEW.indexOf('ronda')===0)render();});return;}
  VIEW=v;
  if(v==='relatos'&&(ROLE==='admin'||ROLE==='dev')){VIEW=v;render();carregarRelatos(render);return;}
  if((v==='hist'||v==='gerencial')&&(ROLE==='admin'||ROLE==='dev')){render();carregarEquipe(render);return;}
  render();
}

// ─── NOVA INSPEÇÃO (dados iniciais) ───
function iniciarInspecao(modId){
  if(ehUsuario()){toast('Seu perfil só permite relatar no RondaSafe','e');navTo('ronda');return;}
  modId=modId||'nr18'; NR18=MODULOS[modId].grupos;
  INSP={id:uid(),tipo:'checklist',modulo:modId,moduloNome:MODULOS[modId].nome,norma:MODULOS[modId].norma,obra:'',empresa:'',cnpjCli:'',endereco:'',responsavelObra:'',acompanhante:'',extras:{},
    data:hoje(),tecnico:(USER&&USER.nome)||'Leonardo Vinicius Santos',status:'andamento',itens:{},obsGeral:'',
    autorId:(USER&&USER.id)||'',autorNome:(USER&&USER.nome)||'',autorEmail:(USER&&USER.email)||'',
    criadoEm:Date.now()};
  STEP=1;VIEW='nova';render();
}
function abrirInspecao(id){
  var i=DB.inspecoes.find(function(x){return x.id===id});
  if(!i)return;
  INSP=JSON.parse(JSON.stringify(i));
  if(INSP.tipo==='passaporte'){VIEW='plist';render();return;}
  NR18=(MODULOS[INSP.modulo]||MODULOS.nr18).grupos;
  VIEW='checklist';STEP=2;render();
}

function viewNova(){
  if(!INSP){return '<div class="card" style="text-align:center;margin-top:40px">Nenhuma inspeção em andamento.<br><button class="btn btn-g btn-w" style="margin-top:12px" onclick="VIEW=\'dash\';render()">Voltar ao início</button></div>';}
  var mod=MODULOS[INSP.modulo]||MODULOS.nr18;
  return '<div class="h-t">Nova Inspeção</div><div class="h-s">'+(mod.nome||'')+' · Dados da auditoria</div>'
    +'<div class="steps"><div class="sdot on"></div><div class="sdot"></div></div>'
    +'<div class="card">'
    +'<div class="iw"><label>Empresa auditada *</label><input class="inp" id="iEmp" placeholder="Razão social da empresa" value="'+(INSP.empresa||'')+'"></div>'
    +'<div class="iw"><label>Nome da obra *</label><input class="inp" id="iObra" placeholder="Ex: Edifício Residencial Aurora" value="'+(INSP.obra||'')+'"></div>'
    +'<div class="iw"><label>Local / Área</label><input class="inp" id="iLocal" placeholder="Ex: Setor de montagem, Bloco B" value="'+(INSP.endereco||'')+'"></div>'
    +'<div class="iw"><label>Auditor (quem fez a inspeção) *</label><input class="inp" id="iAuditor" placeholder="Nome do auditor" value="'+(INSP.tecnico||(USER&&USER.nome)||'')+'"></div>'
    +'<div class="iw"><label>Responsável da área (presente ou auditado)</label><input class="inp" id="iAcomp" placeholder="Nome do responsável da área presente ou auditado" value="'+(INSP.acompanhante||'')+'"></div>'
    +'<div class="iw"><label>Data da inspeção</label><input class="inp" type="date" id="iData" value="'+(INSP.data||hoje())+'"></div>'
    +'</div>'
    +camposExtraHTML(mod)
    +'<div style="display:flex;gap:10px">'
    +'<button class="btn btn-o" onclick="VIEW=\'dash\';render()">Cancelar</button>'
    +'<button class="btn btn-g" style="flex:1" onclick="salvarDadosObra()">Próximo: Checklist →</button>'
    +'</div>';
}
function camposExtraHTML(mod){
  if(!mod.extras||!mod.extras.length)return '';
  var ex=INSP.extras||{};
  var html='<div class="card">';
  mod.extras.forEach(function(c){
    if(c.id==='veredito')return; // veredito (liberação) vai para o FINAL do checklist
    if(c.sec){html+='<div class="sec-l" style="margin:6px 0 10px">'+c.sec+'</div>';return;}
    var v=ex[c.id]!=null?(''+ex[c.id]):'';
    var esc=v.replace(/"/g,'&quot;');
    if(c.tipo==='select'){
      var opts='<option value="">Selecione...</option>'+c.opc.map(function(o){return '<option value="'+o+'"'+(v===o?' selected':'')+'>'+o+'</option>';}).join('');
      html+='<div class="iw"><label>'+c.label+'</label><select class="inp" id="ix_'+c.id+'">'+opts+'</select></div>';
    }else{
      var t=c.tipo==='num'?'number':c.tipo==='data'?'date':'text';
      var step=c.tipo==='num'?' step="any" inputmode="decimal"':'';
      html+='<div class="iw"><label>'+c.label+'</label><input class="inp" id="ix_'+c.id+'" type="'+t+'"'+step+' placeholder="'+(c.ph||'')+'" value="'+esc+'"></div>';
    }
  });
  return html+'</div>';
}

function salvarDadosObra(){
  var emp=document.getElementById('iEmp').value.trim();
  var obra=document.getElementById('iObra').value.trim();
  var auditor=document.getElementById('iAuditor').value.trim();
  if(!emp||!obra){toast('Preencha empresa e obra','e');return}
  if(!auditor){toast('Preencha o auditor','e');return}
  INSP.empresa=emp;INSP.obra=obra;
  INSP.endereco=document.getElementById('iLocal').value.trim();
  INSP.tecnico=auditor;
  var ac=document.getElementById('iAcomp');INSP.acompanhante=ac?ac.value.trim():'';
  INSP.data=document.getElementById('iData').value;
  var mod=MODULOS[INSP.modulo]||MODULOS.nr18;
  if(mod.extras){INSP.extras=INSP.extras||{};mod.extras.forEach(function(c){if(c.sec)return;var el=document.getElementById('ix_'+c.id);if(el)INSP.extras[c.id]=el.value;});}
  STEP=2;VIEW='checklist';render();
}

// ─── CHECKLIST ───
function viewChecklist(){
  if(!INSP||!NR18){return '<div class="card" style="text-align:center;margin-top:40px">Nenhuma inspeção em andamento.<br><button class="btn btn-g btn-w" style="margin-top:12px" onclick="VIEW=\'dash\';render()">Voltar ao início</button></div>';}
  var total=0,feitos=0;
  NR18.forEach(function(g){g.itens.forEach(function(it){total++;if(INSP.itens[it.id]&&INSP.itens[it.id].status)feitos++})});
  var pct=total?Math.round(feitos/total*100):0;
  
  var grupos=NR18.map(function(g,gi){
    var itensHtml=g.itens.map(function(it){return renderItem(it)}).join('');
    return '<div class="sec-l">'+g.grp+'</div>'+itensHtml;
  }).join('');

  // Liberação (veredito) — só no FINAL do checklist, como conclusão
  var modC=MODULOS[INSP.modulo]||MODULOS.nr18;
  var verd=(modC.extras||[]).filter(function(c){return c.id==='veredito';})[0];
  var veredHtml='';
  if(verd){
    var vv=(INSP.extras&&INSP.extras.veredito)||'';
    var opts='<option value="">Selecione...</option>'+verd.opc.map(function(o){return '<option value="'+o+'"'+(vv===o?' selected':'')+'>'+o+'</option>';}).join('');
    veredHtml='<div class="card" style="margin-top:16px;border:1.5px solid var(--g2)">'
      +'<div class="sec-l" style="margin:2px 0 10px">✅ Liberação — conclusão da inspeção</div>'
      +'<div class="iw"><label>'+verd.label+'</label><select class="inp" id="ix_veredito" onchange="setVeredito(this.value)">'+opts+'</select></div>'
      +'<p style="font-size:11px;color:var(--tx3);margin:6px 2px 0;line-height:1.5">Defina aqui, após conferir todos os itens, se o trabalho está liberado ou não.</p>'
      +'</div>';
  }
  
  return '<button class="back-btn" onclick="voltarDados()">← Voltar aos dados da obra</button>'
    +'<div class="h-t">'+(INSP.obra||'Checklist')+'</div>'
    +'<div class="h-s">'+(INSP.empresa||'')+' · '+fd(INSP.data)+'</div>'
    +'<div class="card" style="padding:14px 16px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;font-weight:600">Progresso</span><span style="font-family:var(--fd);font-size:15px;font-weight:700;color:var(--g2)">'+feitos+'/'+total+'</span></div>'
    +'<div class="prog"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
    +'</div>'
    +grupos
    +'<div class="card" style="margin-top:16px"><div class="iw"><label>Observações gerais da inspeção</label><textarea class="inp" id="obsGeral" placeholder="Considerações finais, prazos para adequação...">'+(INSP.obsGeral||'')+'</textarea></div></div>'
    +veredHtml
    +'<div class="act-row">'
    +'<button class="btn btn-o" onclick="salvarRascunho()">💾 Rascunho</button>'
    +'<button class="btn btn-g btn-grow" onclick="finalizarInspecao()">✓ Finalizar</button>'
    +'</div>'
    +'<button class="btn btn-clear" style="width:100%;margin-top:10px" onclick="limparTudo()">🧹 Limpar tudo (recomeçar)</button>'
    +'<div style="height:20px"></div>';
}

function renderItem(it){
  var st=INSP.itens[it.id]||{};
  var cls=st.status==='C'?'done-c':st.status==='NC'?'done-nc':st.status==='NA'?'done-na':'';
  var photos=st.fotos||[];
  var photosHtml=photos.map(function(p,pi){
    return '<div class="ii-photo-wrap"><img class="ii-photo" src="'+p+'"><button class="ii-photo-del" onclick="delFoto(\''+it.id+'\','+pi+')">×</button></div>';
  }).join('');
  
  return '<div class="insp-item '+cls+'" id="item-'+it.id+'">'
    +'<div class="ii-top">'
    +'<div><div class="ii-tit">'+it.t+'</div><div class="ii-norma">📖 '+it.n+'</div></div>'
    +'</div>'
    +'<div class="ii-desc">'+it.d+'</div>'
    +'<div class="ii-opts">'
    +'<div class="ii-opt'+(st.status==='C'?' sel-c':'')+'" onclick="setStatus(\''+it.id+'\',\'C\')">✓ Conforme</div>'
    +'<div class="ii-opt'+(st.status==='NC'?' sel-nc':'')+'" onclick="setStatus(\''+it.id+'\',\'NC\')">✕ Não Conforme</div>'
    +'<div class="ii-opt'+(st.status==='NA'?' sel-na':'')+'" onclick="setStatus(\''+it.id+'\',\'NA\')">— N/A</div>'
    +'</div>'
    +'<div class="ii-extra'+(st.status?' show':'')+'" id="extra-'+it.id+'">'
    +(st.status==='NC'?'<div class="iw"><label>Nível de risco</label><select class="inp" onchange="setRisco(\''+it.id+'\',this.value)"><option value="">Selecione...</option><option value="alto"'+(st.risco==='alto'?' selected':'')+'>🔴 Alto</option><option value="medio"'+(st.risco==='medio'?' selected':'')+'>🟡 Médio</option><option value="baixo"'+(st.risco==='baixo'?' selected':'')+'>🟢 Baixo</option></select></div>':'')
    +(st.status==='NC'?'<div class="iw"><label>Ação corretiva necessária</label><textarea class="inp" placeholder="O que deve ser feito para adequar..." oninput="setAcao(\''+it.id+'\',this.value)">'+(st.acao||'')+'</textarea></div>':'')
    +'<div class="ii-photos">'+photosHtml+'</div>'
    +'<div class="photo-btns">'
    +'<button class="photo-btn" onclick="tirarFoto(\''+it.id+'\')">📷 Tirar Foto</button>'
    +'<button class="photo-btn" onclick="addFoto(\''+it.id+'\')">🖼️ Galeria</button>'
    +'</div>'
    +'<div class="iw"><label>Observação do item</label><input class="inp" placeholder="Detalhe o que foi observado..." value="'+(st.obs||'')+'" oninput="setObs(\''+it.id+'\',this.value)"></div>'
    +'<button class="ii-clear" onclick="limparItem(\''+it.id+'\')">🧹 Limpar este item</button>'
    +'</div>'
    +'</div>';
}

function voltarDados(){ if(INSP&&INSP.tipo==='passaporte'){VIEW='pnova';} else {STEP=1;VIEW='nova';} render(); }
function limparItem(id){

var LASTGEO=null;
function obterGeo(cb){
  if(!navigator.geolocation){cb(null);return;}
  navigator.geolocation.getCurrentPosition(
    function(p){LASTGEO={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy,t:Date.now()};cb(LASTGEO);},
    function(){cb(LASTGEO||null);},
    {enableHighAccuracy:true,timeout:8000,maximumAge:120000}
  );
}
function geoLinhas(){
  var now=new Date();
  var p2=function(n){return ('0'+n).slice(-2);};
  var dt=p2(now.getDate())+'/'+p2(now.getMonth()+1)+'/'+now.getFullYear()+' '+p2(now.getHours())+':'+p2(now.getMinutes());
  var linhas=[dt];
  if(LASTGEO){linhas.push('Lat '+LASTGEO.lat.toFixed(6)+'   Lng '+LASTGEO.lng.toFixed(6));}
  else{linhas.push('Localizacao indisponivel');}
  return linhas;
}
function carimbarFoto(dataURL,linhas){
  return new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){
      var cv=document.createElement('canvas');cv.width=img.width;cv.height=img.height;
      var ctx=cv.getContext('2d');ctx.drawImage(img,0,0);
      var fs=Math.max(13,Math.round(cv.width*0.028)),pad=Math.round(fs*0.55),lh=Math.round(fs*1.35);
      var bh=lh*linhas.length+pad*2;
      ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,cv.height-bh,cv.width,bh);
      ctx.fillStyle='#ffffff';ctx.textBaseline='top';ctx.font='bold '+fs+'px Arial, sans-serif';
      linhas.forEach(function(t,i){ctx.fillText(t,pad,cv.height-bh+pad+i*lh);});
      resolve(cv.toDataURL('image/jpeg',0.82));
    };
    img.onerror=function(){resolve(dataURL);};
    img.src=dataURL;
  });
}
function handleFotos(files){
  files=Array.prototype.slice.call(files||[]);
  if(!files.length){ return; }
  if(!photoTarget){ toast('Toque em uma foto a partir do item','e'); return; }
  var id=photoTarget;
  toast('Processando foto...','i');
  obterGeo(function(){
    var linhas=geoLinhas();
    // allSettled manual: uma foto com problema não derruba as outras
    var tarefas=files.map(function(f){
      return corrigirExif(f)
        .then(function(d){ return carimbarFoto(d,linhas); })
        .then(function(s){ return {ok:true,val:s}; })
        .catch(function(){ return {ok:false}; });
    });
    Promise.all(tarefas).then(function(res){
      var results=res.filter(function(x){return x.ok}).map(function(x){return x.val});
      var falhas=res.length-results.length;
      if(!results.length){ toast('Não foi possível ler a foto. Tente novamente.','e'); return; }
      if(id.indexOf('rel:')===0){
        var ridx=parseInt(id.slice(4),10);
        if(REL&&REL.itens&&REL.itens[ridx]){
          if(!REL.itens[ridx].fotos)REL.itens[ridx].fotos=[];
          REL.itens[ridx].fotos=REL.itens[ridx].fotos.concat(results);
          try{ save(); }catch(e){}
          if(VIEW==='ronda_rform')render();
        }
      } else if(id==='ncform'){
        if(RS_FORM){RS_FORM.foto_antes=results[0];try{save();}catch(e){}if(VIEW==='ronda_nc')render();}
      } else if(id.indexOf('ncbefore:')===0){
        var nb=rsNcById(id.slice(9));if(nb){nb.foto_antes=results[0];nb._dirty=!!nb.empreiteira_id;nb.atualizadoEm=Date.now();try{save();rondaAgendarSync();}catch(e){}if(VIEW==='ronda_det')render();}
      } else if(id.indexOf('ncafter:')===0){
        var na=rsNcById(id.slice(8));if(na){na.foto_depois=results[0];na._dirty=!!na.empreiteira_id;na.atualizadoEm=Date.now();try{save();rondaAgendarSync();}catch(e){}if(VIEW==='ronda_det')render();}
      } else if(id.indexOf('co:')===0){
        var co=findColab(id.slice(3));
        if(co){ co.fotos=(co.fotos||[]).concat(results); reColab(co.cid); }
      } else {
        if(!INSP.itens[id])INSP.itens[id]={};
        if(!INSP.itens[id].fotos)INSP.itens[id].fotos=[];
        INSP.itens[id].fotos=INSP.itens[id].fotos.concat(results);
        var it=null;
        NR18.forEach(function(g){g.itens.forEach(function(x){if(x.id===id)it=x})});
        var el=document.getElementById('item-'+id);
        if(el&&it){var tmp=document.createElement('div');tmp.innerHTML=renderItem(it);el.replaceWith(tmp.firstChild)}
      }
      // SALVA na hora — a foto não some mais se o app recarregar/sincronizar
      try{ persistInsp(); save(); }catch(e){}
      if(falhas){ toast(results.length+' foto(s) adicionada(s) • '+falhas+' falhou','i'); }
      else { toast('Foto adicionada!','s'); }
    }).catch(function(){ toast('Erro ao adicionar foto. Tente novamente.','e'); });
  });
}
function delFoto(id,pi){
  if(INSP.itens[id]&&INSP.itens[id].fotos){
    INSP.itens[id].fotos.splice(pi,1);
    var it=null;NR18.forEach(function(g){g.itens.forEach(function(x){if(x.id===id)it=x})});
    var el=document.getElementById('item-'+id);
    if(el&&it){var tmp=document.createElement('div');tmp.innerHTML=renderItem(it);el.replaceWith(tmp.firstChild)}
    try{ persistInsp(); save(); }catch(e){}
  }
}

function calcResumo(){
  var c=0,nc=0,na=0,total=0;
  NR18.forEach(function(g){g.itens.forEach(function(it){
    total++;
    var s=INSP.itens[it.id];
    if(s&&s.status==='C')c++;
    else if(s&&s.status==='NC')nc++;
    else if(s&&s.status==='NA')na++;
  })});
  var avaliados=c+nc;
  var pct=avaliados?Math.round(c/avaliados*100):0;
  return {c:c,nc:nc,na:na,total:total,pct:pct};
}

    +slot('tec','Responsável pela auditoria',INSP.tecnico||(USER&&USER.nome)||'Leonardo Vinicius Santos','assNomeTec')

    +'<div style="height:20px"></div>';
}
function setAssNome(role,v){if(!INSP.ass)INSP.ass={};if(!INSP.ass[role])INSP.ass[role]={};INSP.ass[role].nome=v}
function abrirSig(role){
  SIG.role=role;
  var html='<div class="sig-ov" id="sigOv">'
    +'<div class="sig-box">'
    +'<div class="sig-tt">'+(role==='tec'?'Assinatura — Responsável pela auditoria':'Assinatura — Responsável da área presente ou auditado')+'</div>'
    +'<div class="sig-sub">Assine no quadro abaixo</div>'
    +'<canvas id="sigCv"></canvas>'
    +'<div class="sig-btns"><button class="btn btn-o" onclick="sigLimpar()">Limpar</button><button class="btn btn-o" onclick="fecharSig()">Cancelar</button><button class="btn btn-g" style="flex:1" onclick="sigConfirmar()">✓ Confirmar</button></div>'
    +'</div></div>';
  var d=document.createElement('div');d.innerHTML=html;document.body.appendChild(d.firstChild);
  var cv=document.getElementById('sigCv');
  var rect=cv.getBoundingClientRect();
  cv.width=Math.round(rect.width*2);cv.height=Math.round(rect.height*2);
  var ctx=cv.getContext('2d');ctx.scale(2,2);
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,rect.width,rect.height);
  ctx.strokeStyle='#16243d';ctx.lineWidth=2.4;ctx.lineCap='round';ctx.lineJoin='round';
  SIG.cv=cv;SIG.ctx=ctx;SIG.empty=true;SIG.draw=false;
  function pos(e){var r=cv.getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top}}
  cv.addEventListener('pointerdown',function(e){e.preventDefault();SIG.draw=true;SIG.empty=false;var pt=pos(e);ctx.beginPath();ctx.moveTo(pt.x,pt.y);ctx.lineTo(pt.x+0.1,pt.y+0.1);ctx.stroke();try{cv.setPointerCapture(e.pointerId)}catch(ex){}});
  cv.addEventListener('pointermove',function(e){if(!SIG.draw)return;e.preventDefault();var pt=pos(e);ctx.lineTo(pt.x,pt.y);ctx.stroke()});
  cv.addEventListener('pointerup',function(){SIG.draw=false});
  cv.addEventListener('pointercancel',function(){SIG.draw=false});
}
function sigLimpar(){if(!SIG.cv)return;var r=SIG.cv.getBoundingClientRect();SIG.ctx.fillStyle='#ffffff';SIG.ctx.fillRect(0,0,r.width,r.height);SIG.empty=true}
function fecharSig(){var o=document.getElementById('sigOv');if(o)o.remove()}
function sigConfirmar(){
  if(SIG.empty){toast('Assine antes de confirmar','e');return}
  var img=SIG.cv.toDataURL('image/png');
  if(!INSP.ass)INSP.ass={};
  var inp=document.getElementById(SIG.role==='tec'?'assNomeTec':'assNomeResp');
  var nome=(INSP.ass[SIG.role]&&INSP.ass[SIG.role].nome)||(inp?inp.value.trim():'');
  INSP.ass[SIG.role]={img:img,nome:nome};
  fecharSig();persistInsp();save();render();toast('Assinatura registrada!','s');
}
function gerarRelatorioFinal(){
  var t=document.getElementById('assNomeTec'),r=document.getElementById('assNomeResp');
  if(!INSP.ass)INSP.ass={};
  if(t&&t.value.trim()){if(!INSP.ass.tec)INSP.ass.tec={};INSP.ass.tec.nome=t.value.trim()}
  if(r&&r.value.trim()){if(!INSP.ass.resp)INSP.ass.resp={};INSP.ass.resp.nome=r.value.trim()}
  persistInsp();save();
  ensureJsPDF(function(){toast('Gerando PDF...','i');setTimeout(function(){ if(INSP.tipo==='passaporte')gerarPDFPassaporte(INSP); else gerarPDF(INSP); },150)});
}
function pdfAssinaturas(doc,insp,c,y,W,mg){
  var assT=insp.ass&&insp.ass.tec,assR=insp.ass&&insp.ass.resp;
  var sx1=mg+2,sx2=W/2+10,sw=70,sh=22,sly=y+sh+2;
  // Inspetor (sempre presente)
  if(assT&&assT.img){try{doc.addImage(assT.img,'PNG',sx1,y,sw,sh)}catch(e){}}
  doc.setDrawColor(80,80,80);doc.setLineWidth(0.3);
  doc.line(sx1,sly,sx1+sw,sly);
  doc.setTextColor(30,30,30);doc.setFont('helvetica','bold');doc.setFontSize(8.5);
  doc.text((assT&&assT.nome)||insp.tecnico||'Leonardo Vinicius Santos',sx1+sw/2,sly+5,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(100,100,100);
  doc.text('Responsável pela auditoria',sx1+sw/2,sly+9,{align:'center'});
  // Responsável (sempre presente)
  if(assR&&assR.img){try{doc.addImage(assR.img,'PNG',sx2,y,sw,sh)}catch(e){}}
  doc.setDrawColor(80,80,80);doc.line(sx2,sly,sx2+sw,sly);
  doc.setTextColor(30,30,30);doc.setFont('helvetica','bold');doc.setFontSize(8.5);
  doc.text((assR&&assR.nome)||insp.acompanhante||insp.responsavelObra||'',sx2+sw/2,sly+5,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(100,100,100);
  doc.text('Responsável da área presente ou auditado',sx2+sw/2,sly+9,{align:'center'});
  return sly;
}

function gerarPDFPassaporte(insp){
  var jsPDF=window.jspdf.jsPDF,doc=new jsPDF('p','mm','a4');
  var W=210,H=297,mg=15,c=cfg(),corR=22,corG=163,corB=74,y=0;
  function header(){doc.setFillColor(corR,corG,corB);doc.rect(0,0,W,28,'F');if(c.logo){try{doc.addImage(c.logo,'JPEG',mg,5,18,18)}catch(e){}}var tx=c.logo?mg+22:mg;doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);doc.text('INSPEÇÃO DE PASSAPORTES DE SEGURANÇA',tx,13);doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text('Vistoria em campo por amostragem — registro fotográfico e relato',tx,20);}
  function footer(pg){doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text((c.empresa||'Protecwork')+'  ·  '+(c.cidade||''),mg,H-8);doc.text('Pág. '+pg,W-mg,H-8,{align:'right'});}
  function novaPag(){doc.addPage();header();y=36;}
  header();y=36;
  doc.setTextColor(20,20,20);doc.setFont('helvetica','bold');doc.setFontSize(15);doc.text('Relatório de Passaportes',mg,y);y+=8;
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(80,80,80);
  doc.text('Obra/Local: '+(insp.obra||'-'),mg,y);y+=5;
  doc.text('Empresa: '+(insp.empresa||'-')+'     Data: '+fd(insp.data),mg,y);y+=5;
  doc.text('Responsável técnico: '+(insp.tecnico||'-'),mg,y);y+=5;
  doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(110,110,110);
  doc.text('Método: verificação por amostragem — colaboradores sorteados em campo para conferência do passaporte.',mg,y);y+=8;
  var r=insp.resumo||{total:0,conformes:0,irregulares:0,pct:0};
  var ok=!(r.irregulares>0);
  if(ok){doc.setFillColor(240,253,244);doc.setDrawColor(187,247,208);}else{doc.setFillColor(254,242,242);doc.setDrawColor(254,202,202);}
  doc.roundedRect(mg,y,W-mg*2,14,2,2,'FD');
  if(ok){doc.setTextColor(22,101,52);}else{doc.setTextColor(153,27,27);}
  doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text('Verificados: '+r.total+'      Conformes: '+r.conformes+'      Com irregularidade: '+r.irregulares+'      ('+r.pct+'% conformes)',mg+4,y+9);
  y+=22;
  (insp.colaboradores||[]).forEach(function(co,ci){
    if(y+34>H-22)novaPag();
    doc.setFillColor(17,24,39);doc.roundedRect(mg,y,W-mg*2,9,1.5,1.5,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(10);
    doc.text((ci+1)+'. '+(co.nome||'Sem nome'),mg+3,y+6);
    var ir=co.res==='IR';
    doc.setTextColor(ir?248:34,ir?113:197,ir?113:94);doc.setFontSize(9);
    doc.text(ir?'IRREGULARIDADE':'CONFORME',W-mg-3,y+6,{align:'right'});
    y+=12;
    doc.setTextColor(70,70,70);doc.setFont('helvetica','normal');doc.setFontSize(9);
    doc.text('Função/atividade: '+(co.funcao||'-'),mg+2,y);y+=6;
    if(co.obs){
      var lbl=ir?'Irregularidades constatadas: ':'Observação: ';
      doc.setFont('helvetica',ir?'bold':'normal');doc.setFontSize(8.5);
      if(ir){doc.setTextColor(153,27,27);}else{doc.setTextColor(70,70,70);}
      var ol=doc.splitTextToSize(lbl+co.obs,W-mg*2-6);
      if(y+ol.length*4>H-22){novaPag();}
      doc.text(ol,mg+2,y);y+=ol.length*4+3;doc.setFont('helvetica','normal');
    }
    var fotos=co.fotos||[];
    if(fotos.length){
      var fw=(W-mg*2-8)/3,fh=fw*0.75,fx=mg+2,cnt=0;
      fotos.forEach(function(f){
        if(cnt===3){cnt=0;fx=mg+2;y+=fh+4;}
        if(y+fh>H-22){novaPag();fx=mg+2;cnt=0;}
        doc.setDrawColor(220,220,220);doc.rect(fx,y,fw,fh);
        rsAddFotoFit(doc,f,fx,y,fw,fh);
        fx+=fw+4;cnt++;
      });
      y+=fh+6;
    }
    y+=5;
  });
  if(insp.obsGeral){
    if(y>H-44)novaPag();
    doc.setTextColor(20,20,20);doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text('Observações gerais',mg,y);y+=6;
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(70,70,70);
    var og=doc.splitTextToSize(insp.obsGeral,W-mg*2);doc.text(og,mg,y);y+=og.length*5+6;
  }
  if(y>H-62)novaPag();
  y+=8;
  var sly=pdfAssinaturas(doc,insp,c,y,W,mg);
  doc.setFontSize(7.5);doc.setTextColor(80,80,80);
  doc.text('Inspeção realizada em '+fd(insp.data)+'   ·   Documento emitido em '+agora(),W-mg,sly+15,{align:'right'});
  var tp=doc.internal.getNumberOfPages();for(var i=1;i<=tp;i++){doc.setPage(i);footer(i);}
  doc.save(dataArq()+'_Passaportes_'+((insp.obra||'inspecao').replace(/[^a-z0-9]/gi,'_'))+'.pdf');
  toast('PDF gerado!','s');
}
function gerarPDF(insp){
  if(MODULOS[insp.modulo]&&MODULOS[insp.modulo].grupos)NR18=MODULOS[insp.modulo].grupos;
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF('p','mm','a4');
  var W=210,H=297,mg=15;
  var c=cfg();
  var y=0;
  var corR=22,corG=163,corB=74;

  function header(){
    doc.setFillColor(corR,corG,corB);
    doc.rect(0,0,W,28,'F');
    if(c.logo){try{doc.addImage(c.logo,'JPEG',mg,5,18,18)}catch(e){}}
    var tx=c.logo?mg+22:mg;
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');doc.setFontSize(13);
    doc.text('RELATÓRIO DE INSPEÇÃO DE SEGURANÇA',tx,13);
    doc.setFont('helvetica','normal');doc.setFontSize(9);
    doc.text(insp.norma||'NR-18 — Canteiro de Obras',tx,20);
  }
  function footer(pg){
    doc.setDrawColor(220,220,220);doc.setLineWidth(0.2);
    doc.line(mg,H-12,W-mg,H-12);
    doc.setTextColor(120,120,120);doc.setFontSize(7);doc.setFont('helvetica','normal');
    doc.text(c.rodape||'',mg,H-8);
    doc.text('Pág. '+pg,W-mg,H-8,{align:'right'});
  }
  var pg=1;
  header();y=36;

  // TÍTULO
  doc.setTextColor(20,20,20);doc.setFont('helvetica','bold');doc.setFontSize(15);
  doc.text('Relatório — '+(insp.moduloNome||'Inspeção de Segurança'),mg,y);y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,100,100);
  doc.text(insp.norma||'NR-18 — Canteiro de Obras',mg,y);y+=10;

  // DADOS DA INSPEÇÃO (altura dinâmica)
  var dados=[];
  dados.push(['Empresa auditada:',insp.empresa]);
  dados.push(['Obra:',insp.obra]);
  if(insp.endereco)dados.push(['Local/Área:',insp.endereco]);
  dados.push(['Data:',fd(insp.data)]);
  dados.push(['Auditor:',insp.tecnico]);
  if(insp.acompanhante)dados.push(['Acompanhante:',insp.acompanhante]);
  var mod=MODULOS[insp.modulo],ex=insp.extras||{};
  if(mod&&mod.extras){mod.extras.forEach(function(cc){if(cc.sec||cc.id==='veredito')return;var v=ex[cc.id];if(v!=null&&(''+v).trim()!=='')dados.push([cc.label.replace(/ —.*$/,'')+':',''+v]);});}
  var verd=ex.veredito;
  var boxH=13+dados.length*5.5+(verd?6.5:0)+3;
  doc.setFillColor(245,248,246);
  doc.roundedRect(mg,y,W-mg*2,boxH,2,2,'F');
  doc.setDrawColor(corR,corG,corB);doc.setLineWidth(0.5);
  doc.line(mg,y,mg,y+boxH);
  var yy=y+7;
  doc.setTextColor(corR,corG,corB);doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('DADOS DA INSPEÇÃO',mg+5,yy);yy+=6;
  doc.setTextColor(40,40,40);doc.setFontSize(9);
  function linha(lbl,val){
    doc.setFont('helvetica','bold');doc.text(lbl,mg+5,yy);
    var w=doc.getTextWidth(lbl);
    doc.setFont('helvetica','normal');doc.text(' '+(val||'—'),mg+5+w,yy);yy+=5.5;
  }
  dados.forEach(function(d){linha(d[0],d[1]);});
  if(verd){
    yy+=1;doc.setFont('helvetica','bold');doc.setFontSize(9.5);
    var vlow=(''+verd).toLowerCase();
    var ok=(vlow.indexOf('aprovado')>=0&&vlow.indexOf('restri')<0)||vlow.indexOf('liberado para')>=0;
    var bad=vlow.indexOf('reprov')>=0||vlow.indexOf('interdit')>=0||vlow.indexOf('não liberado')>=0||vlow.indexOf('nao liberado')>=0;
    if(ok)doc.setTextColor(22,128,61);else if(bad)doc.setTextColor(200,40,40);else doc.setTextColor(180,120,0);
    doc.text('Situação: '+verd,mg+5,yy);yy+=5.5;
    doc.setTextColor(40,40,40);
  }
  y+=boxH+6;

  // RESUMO EXECUTIVO
  var r=insp.resumo||calcResumo();
  doc.setFillColor(corR,corG,corB);
  doc.roundedRect(mg,y,W-mg*2,26,2,2,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('RESULTADO DA INSPEÇÃO',mg+5,y+7);
  var bw=(W-mg*2)/4;
  var resumoItems=[['CONFORMES',r.c,''],['NÃO CONFORMES',r.nc,''],['NÃO APLICÁVEIS',r.na,''],['% CONFORMIDADE',r.pct+'%','']];
  resumoItems.forEach(function(it,i){
    var x=mg+i*bw;
    doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.text(String(it[1]),x+bw/2,y+17,{align:'center'});
    doc.setFontSize(6);doc.setFont('helvetica','normal');
    doc.text(it[0],x+bw/2,y+22,{align:'center'});
  });
  y+=32;

  // PARECER
  var parecer=r.nc===0?'CONFORME — Canteiro atende aos requisitos verificados da NR-18.':
    r.nc<=2?'CONFORME COM RESSALVAS — Adequações pontuais necessárias.':
    'NÃO CONFORME — Foram identificadas não conformidades que exigem ação corretiva imediata.';
  var pcor=r.nc===0?[34,163,74]:r.nc<=2?[245,158,11]:[239,68,68];
  doc.setFillColor(pcor[0],pcor[1],pcor[2]);
  doc.roundedRect(mg,y,W-mg*2,12,2,2,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(8.5);
  doc.text('PARECER TÉCNICO:',mg+4,y+5);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);
  var plines=doc.splitTextToSize(parecer,W-mg*2-8);
  doc.text(plines,mg+4,y+9);
  y+=18;

  footer(pg);

  // ITENS DETALHADOS
  NR18.forEach(function(g){
    var temItens=g.itens.some(function(it){return insp.itens[it.id]&&insp.itens[it.id].status});
    if(!temItens)return;
    if(y>H-40){doc.addPage();pg++;header();footer(pg);y=36}
    // Cabeçalho grupo
    doc.setFillColor(30,40,34);
    doc.roundedRect(mg,y,W-mg*2,8,1,1,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);
    doc.text(g.grp.toUpperCase(),mg+4,y+5.5);
    y+=12;

    g.itens.forEach(function(it){
      var st=insp.itens[it.id];
      if(!st||!st.status)return;
      var stTxt=st.status==='C'?'CONFORME':st.status==='NC'?'NÃO CONFORME':'NÃO APLICÁVEL';
      var stCor=st.status==='C'?[34,163,74]:st.status==='NC'?[239,68,68]:[120,120,120];
      // calcular altura necessária
      var descLines=doc.splitTextToSize(it.d,W-mg*2-10);
      var needH=18+descLines.length*3.5;
      if(st.acao)needH+=10;
      if(st.obs)needH+=8;
      if(y+needH>H-20){doc.addPage();pg++;header();footer(pg);y=36}

      // box item
      doc.setDrawColor(225,225,225);doc.setLineWidth(0.2);
      doc.setFillColor(250,250,250);
      var boxY=y;
      // título + status
      doc.setTextColor(20,20,20);doc.setFont('helvetica','bold');doc.setFontSize(9);
      var titLines=doc.splitTextToSize(it.t,W-mg*2-45);
      doc.text(titLines,mg+3,y+5);
      // badge status
      doc.setFillColor(stCor[0],stCor[1],stCor[2]);
      doc.roundedRect(W-mg-38,y+1,38,6,1,1,'F');
      doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(6.5);
      doc.text(stTxt,W-mg-19,y+5,{align:'center'});
      y+=titLines.length*4+2;
      // norma
      doc.setTextColor(corR,corG,corB);doc.setFont('helvetica','bold');doc.setFontSize(7);
      doc.text(it.n,mg+3,y+2);y+=5;
      // descrição
      doc.setTextColor(90,90,90);doc.setFont('helvetica','normal');doc.setFontSize(7);
      doc.text(descLines,mg+3,y+2);y+=descLines.length*3.5+2;
      // risco
      if(st.status==='NC'&&st.risco){
        var rcor=st.risco==='alto'?[239,68,68]:st.risco==='medio'?[245,158,11]:[34,163,74];
        doc.setFillColor(rcor[0],rcor[1],rcor[2]);
        doc.roundedRect(mg+3,y,28,5,1,1,'F');
        doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(6.5);
        doc.text('RISCO '+st.risco.toUpperCase(),mg+17,y+3.5,{align:'center'});
        y+=8;
      }
      // ação corretiva
      if(st.acao){
        doc.setTextColor(180,40,40);doc.setFont('helvetica','bold');doc.setFontSize(7);
        doc.text('Ação corretiva:',mg+3,y+2);
        doc.setTextColor(60,60,60);doc.setFont('helvetica','normal');
        var acaoLines=doc.splitTextToSize(st.acao,W-mg*2-30);
        doc.text(acaoLines,mg+28,y+2);y+=Math.max(5,acaoLines.length*3.5);
      }
      // obs
      if(st.obs){
        doc.setTextColor(100,100,100);doc.setFont('helvetica','italic');doc.setFontSize(7);
        var obsLines=doc.splitTextToSize('Obs: '+st.obs,W-mg*2-10);
        doc.text(obsLines,mg+3,y+2);y+=obsLines.length*3.5;
      }
      // linha separadora
      doc.setDrawColor(230,230,230);doc.line(mg,y+2,W-mg,y+2);
      y+=6;
    });
  });

  // FOTOS — cada foto em destaque
  var temFotos=false;
  NR18.forEach(function(g){g.itens.forEach(function(it){var s=insp.itens[it.id];if(s&&s.fotos&&s.fotos.length)temFotos=true})});
  if(temFotos){
    doc.addPage();pg++;header();footer(pg);y=36;
    doc.setTextColor(20,20,20);doc.setFont('helvetica','bold');doc.setFontSize(13);
    doc.text('Registro Fotográfico',mg,y);y+=8;
    NR18.forEach(function(g){g.itens.forEach(function(it){
      var s=insp.itens[it.id];
      if(!s||!s.fotos||!s.fotos.length)return;
      s.fotos.forEach(function(foto,fi){
        if(y>H-95){doc.addPage();pg++;header();footer(pg);y=36}

  if(y>H-70){doc.addPage();pg++;header();footer(pg);y=36}
  if(insp.obsGeral){

  if(y>H-62){doc.addPage();pg++;header();footer(pg);y=36}

  doc.text('Inspeção realizada em '+fd(insp.data)+'   ·   Documento emitido em '+agora(),W-mg,sly+15,{align:'right'});

  footer(pg);

  // base legal nota
  if(y<H-30){
    y+=18;

    doc.setTextColor(140,140,140);doc.setFont('helvetica','italic');doc.setFontSize(6.5);

    var notaL=doc.splitTextToSize(nota,W-mg*2);
    doc.text(notaL,mg,y);
  }

  // salvar
  var nomeArq=dataArq(insp.data)+'_Inspecao_NR18_'+(insp.obra||'obra').replace(/[^a-z0-9]/gi,'_').slice(0,30)+'.pdf';
  doc.save(nomeArq);

}

function donutSVG(segs,total,centerLbl){
  var r=42,c=2*Math.PI*r,off=0;
  var circles=segs.filter(function(x){return x.v>0;}).map(function(x){
    var len=(x.v/total)*c;
    var el='<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+x.c+'" stroke-width="16" stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 60 60)"/>';
    off+=len;return el;
  }).join('');
  return '<svg viewBox="0 0 120 120" style="width:100%;max-width:118px;display:block">'
    +'<circle cx="60" cy="60" r="42" fill="none" stroke="var(--bdr)" stroke-width="16"/>'+circles
    +'<text x="60" y="58" text-anchor="middle" dominant-baseline="central" font-size="21" font-weight="800" fill="var(--tx)" font-family="Sora,sans-serif">'+centerLbl+'</text>'
    +'<text x="60" y="76" text-anchor="middle" font-size="9" fill="var(--tx3)" font-family="Manrope,sans-serif">conforme</text></svg>';
}
function graficosEquipe(){
  var e=EQUIPE||[];if(!e.length)return '';
  // conformidade
  var tc=0,tnc=0,tna=0;
  e.forEach(function(i){var r=i.resumo||{};tc+=(r.c||r.conformes||0);tnc+=(r.nc||r.irregulares||0);tna+=(r.na||0);});
  var tot=tc+tnc+tna;
  var conf='';
  if(tot>0){
    var donut=donutSVG([{v:tc,c:'#16a34a'},{v:tnc,c:'#ef4444'},{v:tna,c:'#94a3b8'}],tot,Math.round(tc/tot*100)+'%');
    var leg='<div class="lg"><span class="lg-d" style="background:#16a34a"></span>Conforme <b>'+tc+'</b></div>'
      +'<div class="lg"><span class="lg-d" style="background:#ef4444"></span>Não conforme <b>'+tnc+'</b></div>'
      +'<div class="lg"><span class="lg-d" style="background:#94a3b8"></span>N/A <b>'+tna+'</b></div>';
    conf='<div class="gr-card"><div class="gr-t">Conformidade geral</div><div style="display:flex;align-items:center;gap:14px"><div style="flex:0 0 110px">'+donut+'</div><div style="flex:1;min-width:0">'+leg+'</div></div></div>';
  }
  // por técnico
  var R=resumoEquipe();var ks=Object.keys(R.porTec);var maxT=1;
  ks.forEach(function(k){maxT=Math.max(maxT,R.porTec[k].c+R.porTec[k].r);});
  var bars=ks.map(function(k){var t=R.porTec[k];var tt=t.c+t.r;var w=Math.round(tt/maxT*100);var cw=tt?Math.round(t.c/tt*100):0;
    return '<div class="bar-row" onclick="setHistFiltro(\''+k+'\')"><div class="bar-lb">'+t.nome+'</div>'
      +'<div class="bar-tk"><div class="bar-fill" style="width:'+Math.max(w,4)+'%;background:#f59e0b"><div style="width:'+cw+'%;background:#16a34a;height:100%;border-radius:6px"></div></div></div>'
      +'<div class="bar-vl">'+tt+'</div></div>';}).join('');
  var tecB=ks.length?'<div class="gr-card"><div class="gr-t">Inspeções por técnico</div>'+bars
    +'<div class="lg" style="margin-top:8px"><span class="lg-d" style="background:#16a34a"></span>Concluídas<span class="lg-d" style="background:#f59e0b;margin-left:12px"></span>Rascunhos</div></div>':'';
  // últimos 7 dias
  var fmt=function(dt){return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2);};
  var cont=[];for(var d=6;d>=0;d--){var dt=new Date();dt.setDate(dt.getDate()-d);var ds=fmt(dt);
    cont.push({lb:('0'+dt.getDate()).slice(-2)+'/'+('0'+(dt.getMonth()+1)).slice(-2),n:e.filter(function(i){return i.data===ds;}).length});}
  var maxD=1;cont.forEach(function(x){maxD=Math.max(maxD,x.n);});
  var cols=cont.map(function(x){var h=x.n?Math.max(Math.round(x.n/maxD*100),8):0;
    return '<div class="day-col"><div class="day-n">'+x.n+'</div><div class="day-bar-wrap"><div class="day-bar" style="height:'+h+'%"></div></div><div class="day-lb">'+x.lb+'</div></div>';}).join('');
  var dayB='<div class="gr-card"><div class="gr-t">Inspeções nos últimos 7 dias</div><div class="day-grid">'+cols+'</div></div>';
  return conf+tecB+dayB;
}

    ctx.A=analiseResumo(listaFull);
    ctx.det=comItens?analiseItens(listaFull):{reincidencia:[],risco:null};
    ctx.lista=listaFull;ctx.comItens=comItens;
    ensureJsPDF(function(){toast('Gerando relatório...','i');setTimeout(function(){gerarPDFGerencial(ctx);},150);});
  }
  if(!ehAdmin){finalizar(lista,true);return;}
  if(SB&&navigator.onLine){
    var ids=lista.map(function(i){return i.id;});
    toast('Coletando dados da equipe...','i');
    SB.from('cs18_inspecoes').select('id,payload').in('id',ids).then(function(r){
      if(r.error||!r.data||!r.data.length){finalizar(lista,false);return;}
      var full=r.data.map(function(row){return row.payload;}).filter(Boolean);
      finalizar(full.length?full:lista,full.length>0);
    }).catch(function(){finalizar(lista,false);});
  }else{finalizar(lista,false);}
}
function gerarPDFGerencial(ctx){

  function ensure(h){if(y+h>H-16){footer(pg);doc.addPage();pg++;header();y=36;}}
  function tabela(titulo,headers,rows,ws,aligns){

    y+=7;

    if(!rows.length){doc.setTextColor(120,120,120);doc.text('Sem dados.',mg+2,y+4);y+=8;return;}

      doc.setTextColor(45,45,45);var xx=mg;

  // KPIs
  var bw=(W-mg*2-9)/4,bh=20;
  function kpi(i,lbl,val,cor){
    var x=mg+i*(bw+3);

    doc.setTextColor(cor[0],cor[1],cor[2]);doc.setFont('helvetica','bold');doc.setFontSize(15);
    doc.text(''+val,x+bw/2,y+9,{align:'center'});

  kpi(2,'Conformidade',A.pctMedio+'%',[22,128,61]);kpi(3,'Itens NC',A.ncTotal,[200,40,40]);
  y+=bh+9;
  // por tipo
  var rTipo=Object.keys(A.porTipo).map(function(k){var t=A.porTipo[k];return [t.nome,''+t.qtd,(t.pctN?Math.round(t.pctSum/t.pctN):0)+'%',''+t.nc];});
  tabela('Inspeções por tipo de norma',['Tipo de inspeção','Qtd','% Conf.','NC'],rTipo,[118,22,24,16],['left','right','right','right']);
  // por obra
  var rObra=Object.keys(A.porObra).sort(function(a,b){return A.porObra[b].qtd-A.porObra[a].qtd;}).map(function(k){var o=A.porObra[k];return [k,''+o.qtd,(o.pctN?Math.round(o.pctSum/o.pctN):0)+'%',''+o.nc];});
  tabela('Inspeções por obra',['Obra','Qtd','% Conf.','NC'],rObra,[112,22,26,20],['left','right','right','right']);

  if(ROLE==='admin'||ROLE==='dev'){

    doc.setTextColor(22,128,61);doc.text('Baixo: '+(det.risco.baixo||0),mg+88,y);

    doc.setTextColor(45,45,45);y+=11;
  }
  // reincidência
  if(ctx.comItens&&det.reincidencia&&det.reincidencia.length){
    var rRe=det.reincidencia.slice(0,10).map(function(d){return [d.t+'  ('+d.n+')',''+d.count];});

  // lista do período
  lista.sort(function(a,b){return (a.data||'').localeCompare(b.data||'');});
  var rLista=lista.map(function(i){
    var r=i.resumo||{};
    return [fd(i.data),i.obra||'—',nomeModulo(i.modulo||i.tipo),(typeof r.pct==='number'?r.pct+'%':'—'),''+(r.nc||0),i.status==='concluida'?'Concluída':'Rascunho'];
  });
  tabela('Inspeções realizadas no período',['Data','Obra','Tipo','%','NC','Situação'],rLista,[20,52,46,14,12,36],['left','left','left','right','right','left']);
  footer(pg);
  doc.save(dataArq()+'_Relatorio-Gerencial-'+(ctx.mes||'')+'.pdf');
  toast('Relatório gerado!','s');
}

function sincronizar(silent){
  if(!SB||!USER){if(!silent)toast('Faça login para sincronizar','e');return;}
  if(!navigator.onLine){SYNC_STATE='off';atualizarSyncChip();if(!silent)toast('Sem internet agora','e');return;}
  SYNC_STATE='sync';atualizarSyncChip();
  syncUp().then(function(){return syncDown();})
   .then(function(){return rondaSyncUp();})
   .then(function(){return new Promise(function(res){rondaSyncDown(res);});})
   .then(function(){
    SYNC_STATE='ok';atualizarSyncChip();
    if(ROLE==='admin'||ROLE==='dev'){carregarEquipe(function(){if(VIEW==='dash'||VIEW==='hist')render();});}
    else if(VIEW==='dash'||VIEW==='hist')render();
    if(VIEW&&VIEW.indexOf('ronda')===0)render();
    if(!silent)toast('Sincronizado!','s');
  }).catch(function(){SYNC_STATE='err';atualizarSyncChip();if(!silent)toast('Erro ao sincronizar','e');});
}

function ymd(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function weekStart(d){var x=new Date(d);var day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function relBuckets(periodo){
  var now=new Date(),keys=[],labels=[],i,d;
  if(periodo==='dia'){for(i=13;i>=0;i--){d=new Date(now);d.setDate(now.getDate()-i);keys.push('D'+ymd(d));labels.push(('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2));}}
  else if(periodo==='semana'){var ws=weekStart(now);for(i=7;i>=0;i--){d=new Date(ws);d.setDate(ws.getDate()-i*7);keys.push('W'+ymd(d));labels.push(('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2));}}
  else if(periodo==='mes'){var mn=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];for(i=11;i>=0;i--){d=new Date(now.getFullYear(),now.getMonth()-i,1);keys.push('M'+d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2));labels.push(mn[d.getMonth()]);}}
  else{for(i=4;i>=0;i--){var y=now.getFullYear()-i;keys.push('Y'+y);labels.push(''+y);}}
  var counts=keys.map(function(){return 0;});
  (RELATOS||[]).forEach(function(r){
    var dt=new Date(r.criado_em),k;
    if(periodo==='dia')k='D'+ymd(dt);
    else if(periodo==='semana')k='W'+ymd(weekStart(dt));
    else if(periodo==='mes')k='M'+dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2);
    else k='Y'+dt.getFullYear();
    var idx=keys.indexOf(k);if(idx>=0)counts[idx]++;
  });
  return {labels:labels,counts:counts};
}
function relBarChart(b){
  var max=Math.max.apply(null,b.counts.concat([1]));
  return '<div style="display:flex;align-items:flex-end;gap:4px;height:120px;padding:6px 0">'+b.counts.map(function(c,i){
    var h=Math.round(c/max*100);

      +'<div style="font-size:9px;font-weight:700;color:var(--tx2);height:12px">'+(c||'')+'</div>'
      +'<div style="width:100%;background:var(--g2);border-radius:4px 4px 0 0;height:'+h+'%;min-height:'+(c?4:0)+'px"></div>'
      +'<div style="font-size:8px;color:var(--tx3);margin-top:3px;white-space:nowrap">'+b.labels[i]+'</div>'
      +'</div>';
  }).join('')+'</div>';
}

function gerarPDFRelato(r){
  var jsPDF=window.jspdf.jsPDF,doc=new jsPDF('p','mm','a4');

  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);

  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text('Canal anônimo — ato e condição insegura',tx,20);
  y=38;
  doc.setTextColor(20,20,20);doc.setFont('helvetica','bold');doc.setFontSize(15);

  var dados=[['Data do relato:',dt.toLocaleString('pt-BR')]];
  if(r.local)dados.push(['Local/Área:',r.local]);
  if(r.obra)dados.push(['Obra:',r.obra]);
  if(r.gravidade)dados.push(['Gravidade:',r.gravidade.charAt(0).toUpperCase()+r.gravidade.slice(1)]);
  dados.push(['Situação:',r.status==='tratado'?'Tratado':'Aberto']);
  var boxH=8+dados.length*5.5;
  doc.roundedRect(mg,y,W-mg*2,boxH,2,2,'F');
  doc.setDrawColor(corR,corG,corB);doc.setLineWidth(0.5);doc.line(mg,y,mg,y+boxH);
  var yy=y+6;doc.setFontSize(9);
  dados.forEach(function(d){doc.setFont('helvetica','bold');doc.setTextColor(40,40,40);doc.text(d[0],mg+5,yy);var w=doc.getTextWidth(d[0]);doc.setFont('helvetica','normal');doc.text(' '+d[1],mg+5+w,yy);yy+=5.5;});
  y+=boxH+8;
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(corR,corG,corB);doc.text('DESCRIÇÃO DO RELATO',mg,y);y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(45,45,45);
  var desc=doc.splitTextToSize(r.descricao||'—',W-mg*2);doc.text(desc,mg,y);y+=desc.length*5+6;
  if(r.foto){try{var pw=80,ph=60;if(y+ph>H-40){doc.addPage();y=20;}doc.setDrawColor(220,220,220);doc.setLineWidth(0.2);doc.rect(mg,y,pw,ph);rsAddFotoFit(doc,r.foto,mg,y,pw,ph);y+=ph+8;}catch(e){}}
  if(r.status==='tratado'){
    if(y>H-50){doc.addPage();y=20;}
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(corR,corG,corB);doc.text('TRATATIVA',mg,y);y+=6;
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(45,45,45);
    var tr=doc.splitTextToSize(r.tratativa||'—',W-mg*2);doc.text(tr,mg,y);y+=tr.length*5+4;
    doc.setFontSize(8);doc.setTextColor(110,110,110);
    doc.text('Tratado por: '+(r.tratado_por||'—')+(r.tratado_em?('  ·  '+new Date(r.tratado_em).toLocaleString('pt-BR')):''),mg,y);y+=6;
  }
  doc.setDrawColor(220,220,220);doc.setLineWidth(0.2);doc.line(mg,H-12,W-mg,H-12);
  doc.setTextColor(120,120,120);doc.setFontSize(7);doc.text(c.rodape||((c.empresa||'Protecwork')+'  ·  '+(c.cidade||'')),mg,H-8);
  doc.save(dataArq(ymd(dt))+'_Relato-'+(r.tipo||'')+'.pdf');
  toast('PDF gerado!','s');
}

// ---------- QR DO CANAL ----------
function ensureQR(cb){
  if(window.QRCode){cb();return;}
  var sc=document.createElement('script');
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  sc.onload=function(){window.QRCode?cb():toast('Falha ao carregar QR','e');};
  sc.onerror=function(){toast('Sem internet para gerar o QR','e');};
  document.head.appendChild(sc);
}
function relatoURL(obra,local){
  var base=location.origin+location.pathname;
  var q='?relato=1';
  if(obra)q+='&obra='+encodeURIComponent(obra);
  if(local)q+='&local='+encodeURIComponent(local);
  return base+q;
}
function abrirQR(){
  var html='<div class="sig-ov" id="qrOv"><div class="sig-box" style="max-width:420px">'
    +'<div class="sig-tt">QR Code do canal de relatos</div>'
    +'<div class="sig-sub">Cole na obra. Quem escanear abre o relato anônimo.</div>'
    +'<div class="iw" style="text-align:left"><label>Obra (opcional)</label><input class="inp" id="qrObra" placeholder="Nome da obra"></div>'
    +'<div class="iw" style="text-align:left"><label>Local / Área (opcional)</label><input class="inp" id="qrLocal" placeholder="Ex: Bloco B"></div>'
    +'<div id="qrBox" style="display:flex;justify-content:center;padding:10px 0"></div>'
    +'<div id="qrLink" style="font-size:10px;color:var(--tx3);word-break:break-all;text-align:center;margin-bottom:8px"></div>'
    +'<div class="sig-btns"><button class="btn btn-o" onclick="fecharQR()">Fechar</button><button class="btn btn-o" onclick="gerarQR()">Gerar</button><button class="btn btn-g" style="flex:1" id="qrDlBtn" onclick="baixarQR()" disabled>⬇️ Baixar PNG</button></div>'
    +'</div></div>';
  var d=document.createElement('div');d.innerHTML=html;document.body.appendChild(d.firstChild);
  ensureQR(function(){gerarQR();});
}
function fecharQR(){var o=document.getElementById('qrOv');if(o)o.remove();}
function gerarQR(){
  if(!window.QRCode){ensureQR(gerarQR);return;}
  var obra=(document.getElementById('qrObra')||{}).value||'';
  var local=(document.getElementById('qrLocal')||{}).value||'';
  var url=relatoURL(obra.trim(),local.trim());
  var box=document.getElementById('qrBox');box.innerHTML='';
  new window.QRCode(box,{text:url,width:200,height:200,correctLevel:window.QRCode.CorrectLevel.M});
  document.getElementById('qrLink').textContent=url;
  var btn=document.getElementById('qrDlBtn');if(btn)btn.disabled=false;
}
function baixarQR(){
  var box=document.getElementById('qrBox');if(!box)return;
  var cv=box.querySelector('canvas');var url=cv?cv.toDataURL('image/png'):(box.querySelector('img')||{}).src;
  if(!url){toast('Gere o QR primeiro','e');return;}
  var a=document.createElement('a');a.href=url;a.download='QR-relato-seguranca.png';document.body.appendChild(a);a.click();a.remove();
}


// ===== RONDASAFE MODULE (injetado) =====
// ═══════════════════════════════════════════════════
// RONDASAFE — Fiscalização de Empreiteiras (módulo CanteiroSafe)
// Mesmo padrão do app: estado em DB local + sync offline-first (_dirty),
// views como funções que retornam HTML, fotos carimbadas, PDF jsPDF.
// ═══════════════════════════════════════════════════
var RS_FORM=null, RS_PT=null, RS_FNC=null;            // form NC, alvo da foto, NC atual em detalhe
var RS_SERIE='dia';                                   // série temporal do painel: dia|semana|mes
var RS_MES='', RS_F={emp:'',status:'',risco:''};      // filtros de acompanhamento
var RS_RANK_MES='';                                   // mês do ranking

// ---- helpers de domínio ----
function rsEmpById(id){return (DB.rs_emp||[]).find(function(e){return e.id===id;});}
function rsNcById(id){return (DB.rs_nc||[]).find(function(n){return n.id===id;});}
function rsEsc(s){return (''+(s==null?'':s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rsCodigo(){var d=new Date();function z(n){return('0'+n).slice(-2);}return 'NC-'+String(d.getFullYear()).slice(2)+z(d.getMonth()+1)+z(d.getDate())+'-'+Math.random().toString(36).slice(2,6).toUpperCase();}
function statusEf(n){if(n.status!=='corrigida'&&n.prazo&&n.prazo<hoje())return 'vencida';return n.status;}
function rsAtrasada(n){if(n.status!=='corrigida'||!n.prazo||!n.data_resolucao)return false;return (''+n.data_resolucao).slice(0,10)>n.prazo;}
var RS_NIVEIS={baixo:{l:'Baixo',c:'#22c55e',p:2},medio:{l:'Médio',c:'#f59e0b',p:4},grave:{l:'Grave',c:'#ef4444',p:8},iminente:{l:'Risco Iminente',c:'#b91c1c',p:15}};
var RS_STATUS={aberta:{l:'Aberta',c:'#f59e0b'},em_correcao:{l:'Em correção',c:'#3b82f6'},corrigida:{l:'Corrigida',c:'#22c55e'},vencida:{l:'Vencida',c:'#ef4444'}};
function rsNivel(n){return RS_NIVEIS[n]||RS_NIVEIS.medio;}
function rsNivelTxt(k){var m={baixo:'Risco baixo',medio:'Risco médio',grave:'Risco grave',iminente:'Risco iminente'};return m[k]||('Risco '+((rsNivel(k).l||'').toLowerCase()));}
function rsNivelDesc(k){var m={baixo:'menor gravidade, corrigir na rotina',medio:'requer atenção, corrigir em breve',grave:'risco sério, corrigir com urgência',iminente:'risco à vida, interromper a atividade imediatamente'};return m[k]||'';}
function hexToRgb(h){h=(''+(h||'#000000')).replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var n=parseInt(h,16)||0;return [(n>>16)&255,(n>>8)&255,n&255];}
function rsStat(s){return RS_STATUS[s]||RS_STATUS.aberta;}
function rsPodeGerenciar(){return ROLE==='admin'||ROLE==='dev';}
function rsPodeCriar(){return !!ROLE;}
function rsPodeEditar(n){return ROLE==='admin'||ROLE==='dev'||(n&&n.fiscal_id===(USER&&USER.id));}

// ---- score e métricas (conforme combinado) ----
function rsScore(ncs){
  var s=100;
  ncs.forEach(function(n){
    var ef=statusEf(n);
    if(ef!=='corrigida') s-=rsNivel(n.nivel_risco).p;   // pendência por gravidade
    if(rsAtrasada(n)) s-=5;                              // corrigida fora do prazo
    if(ef==='vencida') s-=8;                             // vencida (aberta além do prazo)
    if(n.reincidencia) s-=6;                             // reincidência
  });
  return Math.max(0,Math.round(s));
}
function rsMetrics(ncs){
  var total=ncs.length,corr=0,corrPrazo=0,reinc=0,graves=0,abertas=0,vencidas=0;
  ncs.forEach(function(n){
    var ef=statusEf(n);
    if(n.status==='corrigida'){corr++;if(!rsAtrasada(n))corrPrazo++;}
    if(ef==='vencida')vencidas++;
    if(ef==='aberta'||ef==='em_correcao')abertas++;
    if(n.reincidencia)reinc++;
    if(n.nivel_risco==='grave'||n.nivel_risco==='iminente')graves++;
  });
  return {total:total,corrigidas:corr,corrPrazo:corrPrazo,pctPrazo:total?Math.round(corrPrazo/total*100):0,reinc:reinc,graves:graves,abertas:abertas,vencidas:vencidas};
}
function rsNCsPeriodo(mes){
  var arr=(DB.rs_nc||[]).slice();
  if(mes)arr=arr.filter(function(n){return (''+(n.data_registro||'')).slice(0,7)===mes;});
  return arr;
}
function rsRanking(mes){
  var ncs=rsNCsPeriodo(mes),by={};
  ncs.forEach(function(n){
    var k=ncEmpresa(n)||'—';
    if(!by[k])by[k]={emp:{id:k,nome:k},ncs:[]};
    by[k].ncs.push(n);
  });
  var arr=Object.keys(by).map(function(k){var o=by[k];return {emp:o.emp,ncs:o.ncs,score:rsScore(o.ncs),m:rsMetrics(o.ncs)};});
  arr.sort(function(a,b){return a.score-b.score || b.m.graves-a.m.graves || b.m.total-a.m.total;});
  return arr;
}

function rsEmpresasUsadas(){

// todas as NCs como "eventos" (NCs avulsas + itens de relatos) p/ gráficos
function rsAllNCs(){
  var arr=[];
  (DB.rs_nc||[]).forEach(function(n){
    arr.push({src:'nc',empresa:ncEmpresa(n),nr:n.nr||'—',nivel_risco:n.nivel_risco||'medio',data:(''+(n.data_registro||'')).slice(0,10)});
